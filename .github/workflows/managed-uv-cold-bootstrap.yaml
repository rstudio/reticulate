on:
  workflow_dispatch:
  push:
    branches: [windows-cold-bootstrap-fix]
  pull_request:
    branches: [main, master]

name: managed-uv-cold-bootstrap

jobs:
  managed-uv-cold-bootstrap:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
          cache: false

      - name: Import stdlib module from a cold managed uv bootstrap
        shell: Rscript --vanilla {0}
        env:
          R_LIBS: ${{ runner.temp }}\Library
          R_LIBS_USER: NULL
        run: |
          cache <- tools::R_user_dir("reticulate", "cache")
          unlink(cache, recursive = TRUE, force = TRUE)
          stopifnot(!file.exists(cache))

          Sys.setenv(
            RETICULATE_PYTHON = "managed",
            RETICULATE_UV = "managed"
          )
          Sys.unsetenv("_RETICULATE_DEBUG_UV_")

          library(reticulate)
          print(reticulate:::uv_binary(bootstrap_install = FALSE))

          err <- NULL
          tryCatch(
            json <- import("json"),
            error = function(e) err <<- e
          )

          if (!is.null(err)) {
            message("reticulate import failed: ", conditionMessage(err))
            managed_uv <- file.path(cache, "uv", "bin", "uv.exe")
            message("managed uv path: ", managed_uv)
            message("managed uv exists: ", file.exists(managed_uv))
            print(list.files(cache, recursive = TRUE, full.names = TRUE))
            stop(err)
          }

          print(json$dumps(list(ok = TRUE)))
          print(py_config())
