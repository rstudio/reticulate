on:
  workflow_dispatch:
  push:
    branches: [windows-cold-bootstrap-fix]
  pull_request:
    branches: [main, master]

name: managed-uv-cold-bootstrap

jobs:
  managed-uv-cold-bootstrap:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
          cache: false

      - name: Import stdlib module from a cold managed uv bootstrap
        shell: Rscript {0}
        run: |
          cache <- tools::R_user_dir("reticulate", "cache")
          unlink(cache, recursive = TRUE, force = TRUE)
          stopifnot(!file.exists(cache))

          Sys.setenv(
            RETICULATE_PYTHON = "managed",
            RETICULATE_UV = "managed",
            "_RETICULATE_DEBUG_UV_" = "1"
          )

          library(reticulate)
          print(reticulate:::uv_binary(bootstrap_install = FALSE))
          json <- import("json")
          print(json$dumps(list(ok = TRUE)))
          print(py_config())
